<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cannon Rogues</title>
    <link rel="stylesheet" href="css/style.css">
    <script>
        window.addEventListener('error', function(e) {
            const hud = document.getElementById('errorConsoleHUD');
            const log = document.getElementById('errorLogContent');
            if (hud && log) {
                hud.style.display = 'block';
                const msg = e.message || e.error || "Syntax / Script Error";
                const file = e.filename || "index";
                const line = e.lineno || 0;
                log.innerHTML += `<div style="color:#ffcc00; border-bottom:1px dashed #ffaa00; padding:5px 0;"><strong>${msg}</strong> (${file}:${line})</div>`;
            }
        });
        window.addEventListener('unhandledrejection', function(e) {
            const hud = document.getElementById('errorConsoleHUD');
            const log = document.getElementById('errorLogContent');
            if (hud && log) {
                hud.style.display = 'block';
                log.innerHTML += `<div style="color:#ffcc00; border-bottom:1px dashed #ffaa00; padding:5px 0;"><strong>PROMISE ERROR:</strong> ${e.reason || e}</div>`;
            }
        });
    </script>
</head>
<body>

    <canvas id="gameCanvas"></canvas>
    
    <!-- Touch capture layer to prevent UI selection issues -->
    <div id="joystickZone"></div>
    <!-- ONSCREEN ERROR CONSOLE HUD (Błyskawiczny podgląd błędów w grze) -->
    <div id="errorConsoleHUD" style="display: none; position: fixed; top: 20px; left: 20px; z-index: 9999999; background: rgba(139, 0, 0, 0.95); color: #fff; border: 3px solid #ff3300; padding: 15px; font-family: monospace; font-size: 12px; width: 80vw; max-height: 40vh; overflow-y: auto; box-shadow: 0 0 30px #000; pointer-events: auto;">
        <div style="display: flex; justify-content: space-between; font-weight: bold; border-bottom: 1px solid #ff8800; padding-bottom: 8px; margin-bottom: 10px;">
            <span style="color: #ffff00;">KONSOLA BŁĘDÓW (WYKRYTO WYJĄTEK JS):</span>
            <button onclick="document.getElementById('errorConsoleHUD').style.display='none'" style="background: #000; color: #fff; border: 1px solid #fff; padding: 2px 8px; cursor: pointer;">ZAMKNIJ [X]</button>
        </div>
        <div id="errorLogContent" style="white-space: pre-wrap;"></div>
    </div>

    <!-- Shadery ekranowe -->
    <div id="fxLayer"></div>
    <div id="scanlines"></div>

    <!-- Panel Administratora (Drawer) -->
    <button id="adminToggleBtn" onclick="toggleAdminPanel()">ADMIN</button>
    <div id="adminPanel">
        <div class="admin-header">DEBUG PANEL</div>
        <label class="admin-btn" style="border-color: #8bde38; color: #8bde38; font-weight: bold; display: block; text-align: center; cursor: pointer; padding: 10px 5px; margin-bottom: 8px; border: 2px solid #444; font-family: 'Press Start 2P', monospace; font-size: 9px;">
            + WCZYTAJ SKÓRKĘ (PNG)
            <input type="file" id="admin-upload-skin" accept="image/png" style="display: none;" onchange="adminUploadSkin(this)">
        </label>
        <button class="admin-btn pause-btn" onclick="togglePause()">PAUZA / WZNIÓW</button>
        <button class="admin-btn" id="adminToggleControlModeBtn" onclick="adminToggleControlMode()">TRYB: RUCH MYSZKĄ</button>
        <button class="admin-btn" onclick="adminSpawnRecruit()">+1 REKRUT</button>
        <button class="admin-btn" onclick="adminSpawnDog()">+1 PIES</button>
        <button class="admin-btn" style="background: #8e1c1c; color: #fff; border-color: #f75c5c; font-weight: bold;" onclick="adminRespawnSoldier('COMMANDER')">RESPAWN: DOWÓDCA</button>
        <button class="admin-btn" style="background: #1166aa; color: #fff; border-color: #33aaff; font-weight: bold;" onclick="adminRespawnSoldier('MEDIC')">RESPAWN: MEDYK</button>
        <button class="admin-btn" style="background: #aa7711; color: #fff; border-color: #ffaa33; font-weight: bold;" onclick="adminRespawnSoldier('ENGINEER')">RESPAWN: INŻYNIER</button>
        <button class="admin-btn" style="background: #3b7a1e; color: #fff; border-color: #7ce844; font-weight: bold;" onclick="adminRespawnSoldier('SNIPER')">RESPAWN: SNAJPER</button>
        <button class="admin-btn" style="background: #62198c; color: #fff; border-color: #b757ed; font-weight: bold;" onclick="adminRespawnSoldier('HEAVY_GUNNER')">RESPAWN: CIĘŻKI STRZELEC</button>
        <button class="admin-btn" style="background: #2b6611; color: #fff; border-color: #ffff00; font-weight: bold; margin-top: 10px;" onclick="showUpgrades()">+ TESTUJ NIEŚMIERTELNIKI</button>
        <button class="admin-btn" style="background: #2b6611; color: #fff; border-color: #8bde38; margin-top: 15px; font-weight: bold;" onclick="window.open('showcase.html', '_blank')">KATALOG KOMPONENTÓW</button>
    </div>

    <div id="uiLayer">
        <div>
            <div class="hud-text" id="waveDisplay">FALA 1</div>
            <div class="hud-text" id="enemiesDisplay">WROGOWIE: 0</div>
        </div>
        <div style="display: flex; justify-content: space-between; align-items: flex-end; width: 100%;">
            <div class="hud-text" id="squadDisplay" style="margin: 0;">SKŁAD: 3</div>
            <div id="doctrinesDisplay" style="display: flex; flex-direction: column; gap: 8px; align-items: flex-end; pointer-events: auto;"></div>
        </div>
    </div>

    <div id="screens" class="hidden">
        <!-- Main Menu -->
        <div id="mainMenu" class="hidden">
            <h1>CANNON<br>ROGUES</h1>
            <button class="btn" onclick="startGame()">ROZPOCZNIJ MISJĘ</button>
            <p style="color: #aaa; font-size: 10px; text-align: center; margin-top: 20px; line-height: 1.5;">
                DOTKNIJ I PRZECIĄGNIJ ZNACZNIK<br><br>SKŁAD AUTOMATYCZNIE STRZELA
            </p>
        </div>

        <!-- Upgrade Screen -->
        <div id="upgradeScreen" class="hidden">
            <h1 id="upgradeTitle" class="hidden">FALA POKONANA</h1>
            <p id="upgradeSubtitle" class="hidden">WYBIERZ WSPARCIE</p>
            <div id="upgradeOptions">
                <!-- Generated dynamically -->
            </div>
        </div>

        <!-- Game Over -->
        <div id="gameOverScreen" class="hidden">
            <h1 style="color: #ff0000; text-shadow: 3px 3px 0 #8b0000;">POLEGŁ W AKCJI</h1>
            <p id="survivalStats" style="color: white; font-size: 12px; margin-bottom: 30px; text-align: center; line-height: 1.5;"></p>
            <button class="btn" onclick="resetGame()">SPRÓBUJ PONOWNIE</button>
        </div>


    </div>

    <!-- Wejście do aplikacji modułowej -->
    <script type="module" src="js/main.js?v=1.0.6"></script>
</body>
</html>
